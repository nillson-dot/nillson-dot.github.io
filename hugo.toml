baseURL = 'https://nillson-dot.github.io/'
languageCode = 'zh-hant'
title = "Nillson's Blog"
theme = 'paper'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[services]
  [services.disqus]
    shortname = 'YOUR_DISQUS_SHORTNAME'     # use disqus comments

[params]
  # color style
  color = 'wheat'                           # linen, wheat, gray, light

  # header social icons               # twitter.com/YOUR_TWITTER_ID
  github = 'nillson-dot'                 # github.com/YOUR_GITHUB_ID           # instagram.com/YOUR_INSTAGRAM_ID
  linkedin = '朝愷-王-a413213a4'             # linkedin.com/in/YOUR_LINKEDIN_ID
  rss = true                                # show rss icon

  # home page profile
  #  avatar = "https://lh3.googleusercontent.com/gg-dl/AOI_d_-5oDFOyJT3pYCzSC2YCQl1ZqGJsS70oDHxTElSoqwQwVLSilGR3BK4GPXHNk14Wrqj1FYJJXosL2GgPGTm9PISI7v6TiHUb70Rr54mLfFmEHiBhOihglh2pbcs3MqzjEadxe40K8ZZrc4twCb84CzHBMCZvit-RCVSm2eWLDDNg_pC=s1024-rj"
  name = 'Nillson'
  bio = 'Discover fresh context'


  # misc
  disableHLJS = true                        # disable highlight.js
  disablePostNavigation = true              # disable post navigation
  monoDarkIcon = true                       # show monochrome dark mode icon
  gravatarCdn = 'GRAVATAR_CDN_LINK'         # e.g. 'https://cdn.v2ex.com/gravatar/'
  math = true                               # enable KaTeX math typesetting globally
  localKatex = false                        # use local KaTeX js/css instead of CDN
  graphCommentId = "YOUR_GRAPH_COMMENT_ID"  # use graph comment (disqus alternative)
  favicon = "favicon.ico"                   # customize the default favicon
  appleTouchIcon = "apple-touch-icon.png"   # customize the default Apple touch icon

  # RTL supprot
  direction = "ltr"                         # RTL support for Right-to-left languages
